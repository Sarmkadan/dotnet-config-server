apiVersion: v1
kind: Namespace
metadata:
  name: config-server
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-server-config
  namespace: config-server
data:
  appsettings.Production.json: |
    {
      "Logging": {
        "LogLevel": {
          "Default": "Information",
          "Microsoft.AspNetCore": "Warning"
        }
      },
      "ApplicationSettings": {
        "EnableSwagger": "false",
        "MaxVersionHistory": "100"
      },
      "Encryption": {
        "KeySize": "256",
        "Iterations": "100000"
      },
      "Webhook": {
        "MaxRetries": "5",
        "TimeoutSeconds": "30"
      },
      "RateLimit": {
        "RequestsPerMinute": "300"
      }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: config-server-secrets
  namespace: config-server
type: Opaque
stringData:
  connection-string: "Server=config-db;Database=ConfigServerDb;User Id=sa;Password=CHANGEME;"
  webhook-signing-key: "CHANGEME-WITH-SECURE-KEY"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: config-server
  labels:
    app: config-server
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: config-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: config-server
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: config-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: app
        image: myregistry.azurecr.io/dotnet-config-server:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: config-server-secrets
              key: connection-string
        - name: Logging__LogLevel__Default
          value: "Information"
        - name: Logging__LogLevel__Microsoft.AspNetCore
          value: "Warning"
        - name: Webhook__WebhookSigningKey
          valueFrom:
            secretKeyRef:
              name: config-server-secrets
              key: webhook-signing-key
        - name: RateLimit__RequestsPerMinute
          value: "300"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: logs
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - config-server
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: config-server
  labels:
    app: config-server
spec:
  type: ClusterIP
  selector:
    app: config-server
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: config-server-lb
  namespace: config-server
  labels:
    app: config-server
spec:
  type: LoadBalancer
  selector:
    app: config-server
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: config-server-hpa
  namespace: config-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: config-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: config-server-pdb
  namespace: config-server
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: config-server
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: config-server
  namespace: config-server
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: config-server
  namespace: config-server
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: config-server
  namespace: config-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: config-server
subjects:
- kind: ServiceAccount
  name: config-server
  namespace: config-server
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: config-server-netpol
  namespace: config-server
spec:
  podSelector:
    matchLabels:
      app: config-server
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: config-server
    ports:
    - protocol: TCP
      port: 8080
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 1433  # SQL Server
    - protocol: TCP
      port: 443   # HTTPS
    - protocol: TCP
      port: 53    # DNS
    - protocol: UDP
      port: 53    # DNS
